<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kaizen Way · Dojo — En maintenance</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#f7f4f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
       font-family:'Crimson Pro',serif;color:#1a1008}
  .card{max-width:440px;width:100%;text-align:center;background:#fff;border:1px solid #ddd0c4;
        border-top:3px solid #560a0f;border-radius:4px;padding:44px 34px}
  .kw{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:3px;color:#560a0f;font-weight:600}
  .pill{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2.5px;
        background:#efb810;color:#1a1008;padding:5px 12px;border-radius:2px;margin:26px 0 18px}
  h1{font-size:24px;font-weight:600;color:#560a0f;margin-bottom:12px}
  p{font-size:17px;line-height:1.65;color:#5a4030;margin-bottom:28px}
  a.btn{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;letter-spacing:1.5px;
        text-decoration:none;background:#efb810;color:#000;border:1px solid #efb810;padding:11px 22px;border-radius:2px}
</style>
</head>
<body>
  <div class="card">
    <div class="kw">KAIZEN WAY</div>
    <span class="pill">MODULE EN PAUSE</span>
    <h1>Le Dojo revient bientôt</h1>
    <p>Le module de simulation de coaching est temporairement en maintenance. Le reste du Cockpit fonctionne normalement.</p>
    <a class="btn" href="/">← Retour au Cockpit</a>
  </div>
</body>
</html>
