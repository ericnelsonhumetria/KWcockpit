function Logo({size}){return <img src={LOGO} style={{height:(size||36)+'px'}}/>;}
function Btn({children,onClick,variant,disabled,full,style}){
  var v=variant||'gold';
  var base={fontFamily:"IBM Plex Mono,monospace",fontSize:'13px',fontWeight:600,letterSpacing:'1.5px',
    padding:'11px 20px',cursor:disabled?'default':'pointer',borderRadius:'2px',transition:'all .15s',border:'none'};
  var bg=v==='gold'?(disabled?'#c0a060':'#E8A800'):v==='burg'?G.burg:v==='dark'?'#181818':'transparent';
  var color=v==='ghost'?G.dim:v==='burg'?'#fff':v==='dark'?'#c8f060':'#000';
  var border=v==='ghost'?('1px solid '+G.border):v==='dark'?'1px solid #3a3a3a':'none';
  return <button onClick={disabled?undefined:onClick}
    style={{...base,background:bg,color:color,border:border,width:full?'100%':undefined,...style}}>{children}</button>;
}
function Stars({n}){
  return <span>{[0,1,2,3,4].map(function(i){return <span key={i} style={{color:i<n?G.gold:'#ddd',fontSize:'14px'}}>&#9733;</span>;})}</span>;
}
function calcICM(ev){
  if(!ev||!ev.icm) return null;
  var s=Object.values(ev.icm).map(function(m){return m.score||0;});
  return Math.round(s.reduce(function(a,b){return a+b;},0)/s.length*20);
}
async function callProxy(payload){
  if(window.PARC_TOKEN){ payload=Object.assign({token:window.PARC_TOKEN},payload); }
  var r=await fetch('/.netlify/functions/parcours-claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  if(!r.ok){var e={};try{e=await r.json();}catch(x){}throw new Error(e.error||'Erreur '+r.status);}

// ── JSON REPAIR ─────────────────────────────────────────────────────────────
// Tente de réparer un JSON tronqué en fermant les structures ouvertes
function repairJSON(str) {
  if (!str) return str;
  // Try direct parse first
  try { JSON.parse(str); return str; } catch(e) {}
  // Try extracting the longest valid JSON object
  var best = null;
  var depth = 0;
  var inStr = false;
  var esc = false;
  for (var i = 0; i < str.length; i++) {
    var c = str[i];
    if (esc) { esc = false; continue; }
    if (c === '\\') { esc = true; continue; }
    if (c === '"' && !esc) { inStr = !inStr; continue; }
    if (inStr) continue;
    if (c === '{') depth++;
    if (c === '}') {
      depth--;
      if (depth === 0) {
        var candidate = str.slice(0, i+1);
        try { JSON.parse(candidate); best = candidate; } catch(e) {}
      }
    }
  }
  if (best) return best;
  // Last resort: close all open braces/brackets
  var opens = []; inStr = false; esc = false;
  for (var j = 0; j < str.length; j++) {
    var ch = str[j];
    if (esc) { esc = false; continue; }
    if (ch === '\\') { esc = true; continue; }
    if (ch === '"') { inStr = !inStr; continue; }
    if (inStr) continue;
    if (ch === '{' || ch === '[') opens.push(ch === '{' ? '}' : ']');
    if ((ch === '}' || ch === ']') && opens.length) opens.pop();
  }
  if (inStr) str += '"';
  str += opens.reverse().join('');
  try { JSON.parse(str); return str; } catch(e) { return null; }
}

// ── TTS ─────────────────────────────────────────────────────────────────────
function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);
  u.lang='fr-FR'; u.rate=0.92; u.pitch=1.05;
  var voices=window.speechSynthesis.getVoices();
  var fr=voices.find(function(v){return v.lang.startsWith('fr')&&v.name.toLowerCase().includes('female');});
  if(!fr) fr=voices.find(function(v){return v.lang.startsWith('fr');});
  if(fr) u.voice=fr;
  window.speechSynthesis.speak(u);
}

// ── VOICE RECOGNITION ────────────────────────────────────────────────────────
function useVoice(onText, active){
  var recRef=useRef(null);
  useEffect(function(){
    if(!active){ if(recRef.current) try{recRef.current.stop();}catch(e){} return; }
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR) return;
    var rec=new SR();
    rec.lang='fr-FR'; rec.continuous=true; rec.interimResults=false;
    rec.onresult=function(e){
      for(var i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) onText(e.results[i][0].transcript+' ');
      }
    };
    rec.onerror=function(){};
    rec.onend=function(){if(active)try{rec.start();}catch(e){}};
    rec.start(); recRef.current=rec;
    return function(){try{rec.stop();}catch(e){}};
  },[active]);
}

              style={{flex:1,resize:'none',background:G.panel,border:'1px solid '+G.border,padding:'10px 13px',color:G.text,outline:'none',borderRadius:'2px',...serif,fontSize:'16px',lineHeight:1.6}}/>
            <Btn onClick={sendMsg} disabled={!input.trim()||loading}>ENVOYER</Btn>
          </div>
        </div>
      </div>
    </div>
  );

  // ── ANALYSE ───────────────────────────────────────────────────────────────
  if(step==='analyse') return (
    <div style={{background:G.bg,minHeight:'100vh'}}>
      <CameraWidget videoRef={videoRef} active={cameraOn}/>
      <div style={{background:G.burg,padding:'12px 24px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{display:'flex',alignItems:'center',gap:'12px'}}><Logo size={26}/>
          <div style={{...mono,fontSize:'10px',color:G.gold,letterSpacing:'2px'}}>AUTO-ANALYSE</div>
        </div>
        <div style={{...mono,fontSize:'10px',color:'#c09098'}}>{msgs.length} échanges</div>
      </div>
      <div style={{maxWidth:'640px',margin:'0 auto',padding:'28px 20px'}}>
        <h2 style={{fontSize:'22px',fontWeight:600,color:G.burg,marginBottom:'6px'}}>Analyse de votre prestation</h2>
        <p style={{...serif,fontSize:'16px',color:G.dim,marginBottom:'24px',fontStyle:'italic'}}>Vos réponses sont intégrées dans l'évaluation finale.</p>
        {err&&<div style={{...pnl,padding:'14px',marginBottom:'16px',background:'#fdf0f0'}}><p style={{...serif,fontSize:'14px',color:'#8a3030'}}>{err}</p></div>}
        {[['reussi','CE QUE VOUS AVEZ REUSSI','Quels comportements avez-vous bien mis en oeuvre ?'],
          ['ameliorer','CE QUE VOUS MODIFIERIEZ','Avec du recul, que changeriez-vous ?'],
          ['parallele','PARALLELE PROFESSIONNEL','Cette situation resonne-t-elle avec vos experiences ?'],
          ['criteres','CRITERES EVALUES','Quelles postures manageriales etaient evaluees ?']
        ].map(function(q){return (
          <div key={q[0]} style={{marginBottom:'18px'}}>
            <div style={{...mono,fontSize:'10px',color:G.dim,letterSpacing:'2px',marginBottom:'6px'}}>{q[1]}</div>
            <textarea value={sa[q[0]]} onChange={function(e){var n=Object.assign({},sa);n[q[0]]=e.target.value;setSa(n);}}
              placeholder={q[2]} rows={4}
              style={{width:'100%',resize:'vertical',background:G.panel,border:'1px solid '+G.border,padding:'11px 13px',color:G.text,outline:'none',borderRadius:'2px',...serif,fontSize:'16px',lineHeight:1.7}}/>
          </div>
        );})}
        <Btn onClick={submitAnalysis} disabled={!Object.values(sa).some(function(v){return v.trim();})} full={true} variant="burg">SOUMETTRE A L ANALYSE</Btn>
      </div>
    </div>
  );

  // ── LOADING ───────────────────────────────────────────────────────────────
  if(step==='loading') return (
    <div style={{background:G.bg,minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center'}}><Logo size={48}/>
        <div style={{...mono,fontSize:'11px',color:G.burg,letterSpacing:'3px',marginTop:'20px'}}>ANALYSE EN COURS...</div>
        <p style={{...serif,fontSize:'16px',color:G.dim,marginTop:'8px'}}>Évaluation par l'IA Kaizen Way</p>
      </div>
    </div>
  );

  // ── RESULT (candidat voit ICM uniquement) ─────────────────────────────────
  if(step==='result'&&result) return (
    <div style={{background:G.bg,minHeight:'100vh'}}>
      <CameraWidget videoRef={videoRef} active={cameraOn}/>
      <div style={{background:G.burg,padding:'12px 24px',display:'flex',alignItems:'center',gap:'12px'}}>
        <Logo size={26}/>
        <div style={{...mono,fontSize:'10px',color:G.gold,letterSpacing:'2px'}}>RÉSULTAT — {name.toUpperCase()}</div>
      </div>
      <div style={{maxWidth:'600px',margin:'0 auto',padding:'40px 20px',textAlign:'center'}}>
        <div style={{fontSize:'48px',marginBottom:'12px'}}>✓</div>
        <h2 style={{fontSize:'22px',fontWeight:600,color:G.burg,marginBottom:'8px'}}>Assessment soumis</h2>
        <p style={{...serif,fontSize:'16px',color:G.dim,lineHeight:1.7,marginBottom:'28px'}}>
          Votre prestation a été transmise. L'administrateur va maintenant procéder au débrief avec vous.
        </p>
        <div style={{...pnl,padding:'20px',marginBottom:'28px',background:'#fff8f8',borderLeft:'3px solid '+G.gold}}>
          <div style={{...mono,fontSize:'10px',color:G.gold,letterSpacing:'2px',marginBottom:'12px'}}>VOTRE ICM</div>
          <div style={{display:'flex',alignItems:'center',gap:'14px'}}>
            <div style={{flex:1,height:'14px',background:'#f0e8e0',borderRadius:'7px',overflow:'hidden'}}>
              <div style={{height:'100%',width:calcICM(result)+'%',background:G.gold,borderRadius:'7px'}}/>
            </div>
            <span style={{...mono,fontSize:'26px',color:G.gold,fontWeight:700}}>{calcICM(result)}%</span>
          </div>
        </div>
        <div style={{...mono,fontSize:'11px',color:G.faint,letterSpacing:'2px'}}>EN ATTENTE DU DEBRIEF...</div>
      </div>
    </div>
  );

  // ── DEBRIEF (candidat — saisie uniquement) ────────────────────────────────
  if(step==='debrief') return (
    <div style={{background:G.bg,minHeight:'100vh'}}>
      <CameraWidget videoRef={videoRef} active={cameraOn}/>
      <div style={{background:G.burg,padding:'12px 24px',display:'flex',alignItems:'center',gap:'12px'}}>
        <Logo size={26}/>
        <div style={{...mono,fontSize:'10px',color:G.gold,letterSpacing:'2px'}}>DÉBRIEF — {name.toUpperCase()}</div>
      </div>
      <div style={{maxWidth:'640px',margin:'0 auto',padding:'28px 20px'}}>
        <div style={{...pnl,padding:'16px 18px',marginBottom:'20px',background:'#fff8f8',borderLeft:'3px solid '+G.burg}}>
          <p style={{...serif,fontSize:'16px',color:G.dim,lineHeight:1.7}}>L'administrateur va vous présenter les résultats. Notez vos réactions et réponses ci-dessous — elles seront transmises avec votre dossier complet.</p>
        </div>
        {debriefVoiceOn&&<div style={{...mono,fontSize:'9px',color:G.faint,marginBottom:'5px'}}>● Transcription active</div>}
        <div style={{display:'flex',gap:'8px',alignItems:'flex-end',marginBottom:'14px'}}>
          <textarea value={debriefInput} onChange={function(e){setDebriefInput(e.target.value);}}
            onKeyDown={function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendDebriefMsg();}}}
            placeholder="Votre réaction au débrief..."
            rows={4}
            style={{flex:1,resize:'none',background:G.panel,border:'1px solid '+G.border,padding:'11px 13px',color:G.text,outline:'none',borderRadius:'2px',...serif,fontSize:'16px',lineHeight:1.6}}/>
          <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
            <Btn onClick={sendDebriefMsg} disabled={!debriefInput.trim()}>ENVOYER</Btn>
            <Btn onClick={function(){setDebriefVoiceOn(!debriefVoiceOn);}} variant="ghost" style={{padding:'6px 10px',fontSize:'10px'}}>{debriefVoiceOn?'🎤 ON':'🎤 OFF'}</Btn>
          </div>
        </div>
        <Btn onClick={finalSubmit} full={true} variant="burg">FINALISER L'ASSESSMENT</Btn>
      </div>
    </div>
  );

  if(step==='done') return (
    <div style={{background:G.bg,minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center',maxWidth:'380px',padding:'24px'}}>
        <Logo size={52}/>
        <div style={{fontSize:'48px',margin:'20px 0'}}>✓</div>
        <h2 style={{fontSize:'22px',fontWeight:600,color:G.burg,marginBottom:'8px'}}>Assessment finalisé</h2>
        <p style={{...serif,fontSize:'16px',color:G.dim,lineHeight:1.7}}>Merci pour votre participation. Votre dossier complet a été transmis.</p>
      </div>
    </div>
  );

  return null;
}

// ════════════════════════════════════════════════════════════════════════════
// APP — ADMIN
// ════════════════════════════════════════════════════════════════════════════
function AdminApp(){
  var [step,setStep]=useState('setup'); // setup > monitoring > debrief > done
  var [mode,setMode]=useState('ia');
  var [candidatName,setCandidatName]=useState('');
  var [msgs,setMsgs]=useState([]);
  var [reneeInput,setReneeInput]=useState('');
  var [reneeVoice,setReneeVoice]=useState(false);
  var [result,setResult]=useState(null);
  var [visualSynth,setVisualSynth]=useState(null);
  var [visualLoading,setVisualLoading]=useState(false);
  var [debriefMsgs,setDebriefMsgs]=useState([]);
  var [frameAnalyses,setFrameAnalyses]=useState([]);
  var [submitted,setSubmitted]=useState(false);
  var endRef=useRef(null);

  useEffect(function(){if(endRef.current)endRef.current.scrollIntoView({behavior:'smooth'});},[msgs,debriefMsgs]);

  useEffect(function(){
    if(!BC) return;
    BC.onmessage=function(e){
      var d=e.data;
      if(d.type==='candidate_msg'){setMsgs(function(p){return p.concat([{role:'user',content:d.content}]);});}
      if(d.type==='ai_msg'){setMsgs(function(p){return p.concat([{role:'assistant',content:d.content}]);});}
      if(d.type==='eval_result'){
        setResult(d.result);
        setCandidatName(d.name||'');
        setFrameAnalyses(d.frameAnalyses||[]);
        // Generate visual synthesis
        setVisualLoading(true);
        callProxy({model:'claude-sonnet-4-5',max_tokens:500,temperature:0,messages:[{role:'user',content:buildVisualPrompt(d.frameAnalyses||[])}]})
          .then(function(data){
            var raw=(data.content||[]).find(function(b){return b.type==='text';});
            if(raw){try{setVisualSynth(JSON.parse(raw.text.match(/\{[\s\S]*\}/)[0]));}catch(x){setVisualSynth({note:raw.text});}}
            setVisualLoading(false);
          })
          .catch(function(){setVisualLoading(false);});
      }
      if(d.type==='debrief_candidat'){setDebriefMsgs(function(p){return p.concat([{role:'candidat',content:d.content,ts:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}]);});}
      if(d.type==='done'){setStep('done');}
      if(d.type==='candidat_ready'){setCandidatName(d.name||candidatName);}
    };
  },[]);

  useVoice(function(t){setReneeInput(function(p){return p+t;});},reneeVoice&&step==='monitoring'&&mode==='human');

  function launch(){
    bc({type:'launch',mode:mode});
    setStep('monitoring');
  }
  function sendRenee(){
    if(!reneeInput.trim()) return;
    var txt=reneeInput.trim(); setReneeInput('');
    setMsgs(function(p){return p.concat([{role:'assistant',content:txt}]);});
    bc({type:'renee_msg',content:txt});
  }
  function startDebrief(){
    bc({type:'start_debrief'});
    setStep('debrief');
  }
  function finalSubmit(){
    if(submitted) return;
    setSubmitted(true);
    // Submit to Netlify Forms
    callProxy({model:'claude-sonnet-4-5',max_tokens:500,temperature:0,messages:[{role:'user',content:buildVisualPrompt(frameAnalyses,[])}]})
      .then(function(data){
        var raw=(data.content||[]).find(function(b){return b.type==='text';});
        var vSynth=visualSynth;
        if(raw){try{vSynth=JSON.parse(raw.text.match(/\{[\s\S]*\}/)[0]);}catch(x){}}
        var fd=new FormData();
        fd.append('form-name','brasserie-assessment');
        fd.append('candidat',candidatName);
        fd.append('date',new Date().toLocaleDateString('fr-FR'));
        fd.append('icm_global',result?calcICM(result)+'%':'—');
        fd.append('evaluation_json',JSON.stringify(result||{}));
        fd.append('transcript',msgs.map(function(m){return (m.role==='user'?candidatName.toUpperCase()+' (GERANT)':'RENEE')+': '+m.content;}).join('\n\n'));
        fd.append('debrief_echange',debriefMsgs.map(function(m){return '['+m.ts+'] CANDIDAT: '+m.content;}).join('\n'));
        fd.append('analyses_visuelles',JSON.stringify(frameAnalyses));
        fd.append('synthese_visuelle',JSON.stringify(vSynth||{}));
        fetch('/',{method:'POST',body:fd}).catch(function(){});
        bc({type:'done_confirmed'});
        setStep('done');
      })
      .catch(function(){
        var fd=new FormData();
        fd.append('form-name','brasserie-assessment');
        fd.append('candidat',candidatName);
        fd.append('date',new Date().toLocaleDateString('fr-FR'));
        fd.append('evaluation_json',JSON.stringify(result||{}));
        fetch('/',{method:'POST',body:fd}).catch(function(){});
        setStep('done');
      });
  }

  // ── SETUP ─────────────────────────────────────────────────────────────────
  if(step==='setup') return (
    <div style={{background:'#0f0f1a',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px'}}>
      <div style={{width:'100%',maxWidth:'480px'}}>
        <div style={{textAlign:'center',marginBottom:'28px'}}>
          <Logo size={48}/>
          <h1 style={{fontSize:'18px',fontWeight:600,color:'#c8f060',fontFamily:"IBM Plex Mono,monospace",letterSpacing:'2px',marginTop:'14px'}}>ESPACE ADMINISTRATEUR</h1>
          <p style={{fontFamily:"Crimson Pro,serif",fontSize:'15px',color:'#888',fontStyle:'italic',marginTop:'4px'}}>La Brasserie des Tuileries</p>
        </div>
        <div style={{background:'#181818',border:'1px solid #3a3a3a',borderRadius:'3px',padding:'24px'}}>
          <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'11px',color:'#c8f060',letterSpacing:'2px',marginBottom:'20px'}}>CHOIX DU MODE</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginBottom:'24px'}}>
            <div onClick={function(){setMode('ia');}}
              style={{border:'2px solid '+(mode==='ia'?'#c8f060':'#3a3a3a'),borderRadius:'4px',padding:'16px',cursor:'pointer',background:mode==='ia'?'rgba(200,240,96,0.08)':'transparent'}}>
              <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'11px',color:'#c8f060',letterSpacing:'1px',marginBottom:'6px'}}>🤖 MODE IA</div>
              <div style={{fontFamily:"Crimson Pro,serif",fontSize:'14px',color:'#888',lineHeight:1.5}}>Renée est jouée par l'IA. Réponses vocalisées automatiquement.</div>
            </div>
            <div onClick={function(){setMode('human');}}
              style={{border:'2px solid '+(mode==='human'?'#c8f060':'#3a3a3a'),borderRadius:'4px',padding:'16px',cursor:'pointer',background:mode==='human'?'rgba(200,240,96,0.08)':'transparent'}}>
              <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'11px',color:'#c8f060',letterSpacing:'1px',marginBottom:'6px'}}>👤 MODE HUMAIN</div>
              <div style={{fontFamily:"Crimson Pro,serif",fontSize:'14px',color:'#888',lineHeight:1.5}}>Vous jouez Renée en temps réel depuis cet écran.</div>
            </div>
          </div>
          <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'10px',color:'#666',marginBottom:'16px',padding:'10px',background:'#0f0f0f',borderRadius:'2px'}}>
            ⚠ Assurez-vous que le candidat a ouvert brasserie.html dans un autre onglet et est connecté avec son mot de passe.
          </div>
          <button onClick={launch}
            style={{width:'100%',background:'#c8f060',color:'#000',border:'none',padding:'13px 20px',fontFamily:"IBM Plex Mono,monospace",fontSize:'13px',fontWeight:600,letterSpacing:'1.5px',cursor:'pointer',borderRadius:'2px'}}>
            LANCER LA SESSION →
          </button>
        </div>
      </div>
    </div>
  );

  // ── MONITORING ────────────────────────────────────────────────────────────
  if(step==='monitoring') return (
    <div style={{background:'#0f0f1a',minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <div style={{background:'#181818',borderBottom:'1px solid #3a3a3a',padding:'10px 20px',display:'flex',alignItems:'center',gap:'12px'}}>
        <Logo size={24}/>
        <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'10px',color:'#c8f060',letterSpacing:'2px'}}>
          ADMIN — {mode==='ia'?'MODE IA':'MODE HUMAIN'} {candidatName?'— '+candidatName.toUpperCase():''}
        </div>
        {result&&<button onClick={startDebrief}
          style={{marginLeft:'auto',background:'#c8f060',color:'#000',border:'none',padding:'6px 14px',fontFamily:"IBM Plex Mono,monospace",fontSize:'11px',fontWeight:600,letterSpacing:'1px',cursor:'pointer',borderRadius:'2px'}}>
          LANCER LE DÉBRIEF →
        </button>}
      </div>
      <div style={{flex:1,overflow:'auto',padding:'16px 20px'}}>
        <div style={{maxWidth:'700px',margin:'0 auto'}}>
          {/* Conversation */}
          <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'10px',color:'#666',letterSpacing:'2px',marginBottom:'12px'}}>CONVERSATION EN TEMPS RÉEL</div>
          {msgs.length===0&&<div style={{fontFamily:"Crimson Pro,serif",fontSize:'14px',color:'#444',fontStyle:'italic',padding:'12px 0'}}>En attente des premiers échanges...</div>}
          {msgs.map(function(m,i){return (
            <div key={i} style={{marginBottom:'12px',padding:'10px 14px',
              background:m.role==='user'?'#1a1a2a':'#1a2a1a',
              borderLeft:'3px solid '+(m.role==='user'?'#6060c8':'#c8f060'),borderRadius:'2px'}}>
              <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'9px',color:m.role==='user'?'#8080c8':'#c8f060',marginBottom:'4px',letterSpacing:'1px'}}>
                {m.role==='user'?(candidatName||'CANDIDAT')+' (GÉRANT)':'RENÉE'}
              </div>
              <div style={{fontFamily:"Crimson Pro,serif",fontSize:'15px',color:'#c8d8c8',lineHeight:1.6}}>{m.content}</div>
            </div>
          );})}
          <div ref={endRef}/>
          {/* Result + Visual synthesis */}
          {result&&(
            <div style={{marginTop:'20px'}}>
              <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'10px',color:'#666',letterSpacing:'2px',marginBottom:'12px',borderTop:'1px solid #2a2a2a',paddingTop:'16px'}}>ÉVALUATION ICM</div>
              <div style={{background:'#181818',border:'1px solid #2a2a2a',borderRadius:'4px',padding:'16px',marginBottom:'14px'}}>
                <div style={{display:'flex',alignItems:'center',gap:'14px',marginBottom:'12px'}}>
                  <div style={{flex:1,height:'10px',background:'#2a2a2a',borderRadius:'5px',overflow:'hidden'}}>
                    <div style={{height:'100%',width:calcICM(result)+'%',background:'#c8f060',borderRadius:'5px'}}/>
                  </div>
                  <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'22px',color:'#c8f060',fontWeight:700}}>{calcICM(result)}%</div>
                </div>
                {Object.entries(result.icm||{}).map(function(e){return(
                  <div key={e[0]} style={{display:'flex',gap:'10px',padding:'6px 0',borderBottom:'1px solid #2a2a2a',alignItems:'flex-start'}}>
                    <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'10px',color:'#c8f060',minWidth:'30px'}}>{e[0]}</div>
                    <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'10px',color:'#888',minWidth:'20px'}}>{e[1].score}/5</div>
                    <div style={{fontFamily:"Crimson Pro,serif",fontSize:'13px',color:'#aaa',lineHeight:1.5}}>{e[1].commentaire}</div>
                  </div>
                );})}
                <div style={{marginTop:'12px',fontFamily:"Crimson Pro,serif",fontSize:'14px',color:'#8a8',lineHeight:1.6,fontStyle:'italic'}}>{result.appreciation}</div>
              </div>
              {visualLoading&&<div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'10px',color:'#666',padding:'8px 0'}}>Synthèse visuelle en cours...</div>}
              {visualSynth&&!visualLoading&&(
                <div style={{background:'#181818',border:'1px solid #2a4a2a',borderRadius:'4px',padding:'14px',marginBottom:'14px'}}>
                  <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'10px',color:'#c8f060',letterSpacing:'2px',marginBottom:'10px'}}>🎥 SYNTHÈSE VISUELLE</div>
                  {Object.entries(visualSynth).map(function(e){return(
                    <div key={e[0]} style={{marginBottom:'8px',display:'flex',gap:'10px'}}>
                      <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'9px',color:'#666',minWidth:'140px',textTransform:'uppercase',paddingTop:'2px'}}>{e[0].replace(/_/g,' ')}</div>
                      <div style={{fontFamily:"Crimson Pro,serif",fontSize:'13px',color:'#c8d8b0',lineHeight:1.5}}>{e[1]}</div>
                    </div>
                  );})}
                </div>
              )}
            </div>
          )}
        </div>
      </div>
      {/* Renée input — mode humain uniquement */}
      {mode==='human'&&(
        <div style={{borderTop:'2px solid #c8f060',padding:'12px 20px',background:'#0f1a0f',flexShrink:0}}>
          <div style={{maxWidth:'700px',margin:'0 auto'}}>
            <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'6px'}}>
              <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'9px',color:'#c8f060',letterSpacing:'2px'}}>RENÉE — VOTRE RÉPONSE</div>
              <button onClick={function(){setReneeVoice(!reneeVoice);}}
                style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'9px',background:reneeVoice?'#c8f060':'rgba(200,240,96,0.2)',color:reneeVoice?'#000':'#c8f060',border:'1px solid #c8f060',padding:'2px 8px',cursor:'pointer',borderRadius:'2px',marginLeft:'auto'}}>
                {reneeVoice?'🎤 DICTEE ON':'🎤 DICTEE OFF'}
              </button>
            </div>
            <div style={{display:'flex',gap:'8px',alignItems:'flex-end'}}>
              <textarea value={reneeInput} onChange={function(e){setReneeInput(e.target.value);}}
                onKeyDown={function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendRenee();}}}
                placeholder="Réponse de Renée... (Entrée pour envoyer)"
                rows={2}
                style={{flex:1,resize:'none',background:'#1a2a1a',border:'1px solid #3a6a3a',padding:'10px 13px',color:'#c8e8c8',outline:'none',borderRadius:'2px',fontFamily:"Crimson Pro,serif",fontSize:'16px',lineHeight:1.6}}/>
              <button onClick={sendRenee} disabled={!reneeInput.trim()}
                style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'13px',fontWeight:600,padding:'0 16px',height:'54px',background:reneeInput.trim()?'#c8f060':'#444',color:'#000',border:'none',cursor:reneeInput.trim()?'pointer':'default',borderRadius:'2px'}}>
                ENVOYER
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );

  // ── DEBRIEF ADMIN ─────────────────────────────────────────────────────────
  if(step==='debrief') return (
    <div style={{background:'#0f0f1a',minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <div style={{background:'#181818',borderBottom:'1px solid #3a3a3a',padding:'10px 20px',display:'flex',alignItems:'center',gap:'12px'}}>
        <Logo size={24}/>
        <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'10px',color:'#c8f060',letterSpacing:'2px'}}>DÉBRIEF — {candidatName.toUpperCase()}</div>
        <button onClick={finalSubmit} disabled={submitted}
          style={{marginLeft:'auto',background:submitted?'#444':'#c8f060',color:'#000',border:'none',padding:'6px 14px',fontFamily:"IBM Plex Mono,monospace",fontSize:'11px',fontWeight:600,letterSpacing:'1px',cursor:submitted?'default':'pointer',borderRadius:'2px'}}>
          {submitted?'ENVOI...':'FINALISER ET ENVOYER'}
        </button>
      </div>
      <div style={{flex:1,overflow:'auto',padding:'20px'}}>
        <div style={{maxWidth:'700px',margin:'0 auto'}}>
          {result&&(
            <div style={{background:'#181818',border:'1px solid #2a2a2a',borderRadius:'4px',padding:'16px',marginBottom:'20px'}}>
              <div style={{display:'flex',alignItems:'center',gap:'14px',marginBottom:'10px'}}>
                <div style={{flex:1,height:'8px',background:'#2a2a2a',borderRadius:'4px',overflow:'hidden'}}>
                  <div style={{height:'100%',width:calcICM(result)+'%',background:'#c8f060',borderRadius:'4px'}}/>
                </div>
                <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'20px',color:'#c8f060',fontWeight:700}}>{calcICM(result)}%</div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'10px'}}>
                <div>
                  <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'9px',color:'#4a9a5a',letterSpacing:'1px',marginBottom:'5px'}}>POINTS FORTS</div>
                  {(result.pointsForts||[]).map(function(p,i){return <div key={i} style={{fontFamily:"Crimson Pro,serif",fontSize:'13px',color:'#8ab88a',marginBottom:'4px'}}>+ {p}</div>;})}
                </div>
                <div>
                  <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'9px',color:'#9a8a3a',letterSpacing:'1px',marginBottom:'5px'}}>VIGILANCE</div>
                  {(result.pointsVigilance||[]).map(function(p,i){return <div key={i} style={{fontFamily:"Crimson Pro,serif",fontSize:'13px',color:'#b89a5a',marginBottom:'4px'}}>△ {p}</div>;})}
                </div>
              </div>
              {visualSynth&&<div style={{borderTop:'1px solid #2a2a2a',paddingTop:'10px'}}>
                <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'9px',color:'#c8f060',marginBottom:'8px'}}>SYNTHESE VISUELLE</div>
                {Object.entries(visualSynth).map(function(e){return(
                  <div key={e[0]} style={{display:'flex',gap:'8px',marginBottom:'5px'}}>
                    <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'9px',color:'#666',minWidth:'120px',textTransform:'uppercase'}}>{e[0].replace(/_/g,' ')}</div>
                    <div style={{fontFamily:"Crimson Pro,serif",fontSize:'13px',color:'#c8d8b0'}}>{e[1]}</div>
                  </div>
                );})}
              </div>}
            </div>
          )}
          <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'10px',color:'#666',letterSpacing:'2px',marginBottom:'12px'}}>RÉACTIONS DU CANDIDAT AU DÉBRIEF</div>
          {debriefMsgs.length===0&&<div style={{fontFamily:"Crimson Pro,serif",fontSize:'14px',color:'#444',fontStyle:'italic'}}>En attente des retours du candidat...</div>}
          {debriefMsgs.map(function(m,i){return(
            <div key={i} style={{marginBottom:'10px',padding:'10px 14px',background:'#1a1a2a',borderLeft:'3px solid #6060c8',borderRadius:'2px'}}>
              <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'9px',color:'#8080c8',marginBottom:'3px'}}>{m.ts} — CANDIDAT</div>
              <div style={{fontFamily:"Crimson Pro,serif",fontSize:'15px',color:'#c8d0e8',lineHeight:1.6}}>{m.content}</div>
            </div>
          );})}
          <div ref={endRef}/>
        </div>
      </div>
    </div>
  );

  if(step==='done') return (
    <div style={{background:'#0f0f1a',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center',maxWidth:'380px',padding:'24px'}}>
        <Logo size={52}/>
        <div style={{fontSize:'48px',margin:'20px 0',color:'#c8f060'}}>✓</div>
        <div style={{fontFamily:"IBM Plex Mono,monospace",fontSize:'16px',color:'#c8f060',marginBottom:'8px'}}>DOSSIER ENVOYÉ</div>
        <p style={{fontFamily:"Crimson Pro,serif",fontSize:'16px',color:'#888',lineHeight:1.7}}>Assessment complet transmis à eric.nelson@kaizenway.fr et a.humbert@kaizenway.fr</p>
      </div>
    </div>
  );

  return null;
}

// ════════════════════════════════════════════════════════════════════════════
// ROOT — LOGIN COMMUN
// ════════════════════════════════════════════════════════════════════════════
function Root(){
  var [role,setRole]=useState(null); // null > 'candidat' | 'admin'
  var [pwd,setPwd]=useState('');
  var [pwdErr,setPwdErr]=useState('');
  var [adminPwd,setAdminPwd]=useState('');
  var [adminPwdErr,setAdminPwdErr]=useState('');
  var [prenom,setPrenom]=useState('');
  var [nom,setNom]=useState('');
  var [candidatReady,setCandidatReady]=useState(false);

  function checkCandidatPwd(){
    fetch('/.netlify/functions/check-pwd',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.ok||d.open) setCandidatReady(true);
        else setPwdErr('Mot de passe incorrect');
      })
      .catch(function(){setCandidatReady(true);});
  }

  function checkAdminPwd(){
    if(adminPwd===ADMIN_PWD) setRole('admin');
    else setAdminPwdErr('Mot de passe administrateur incorrect');
  }

  // Candidat: enter name after password OK
  if(candidatReady&&!role){
    var name=(prenom.trim()+' '+nom.trim()).trim();
    return (
      <div style={{background:G.bg,minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px'}}>
        <div style={{width:'100%',maxWidth:'420px'}}>
          <div style={{textAlign:'center',marginBottom:'28px'}}>
            <Logo size={52}/>
            <h1 style={{fontSize:'20px',fontWeight:600,color:G.text,marginTop:'14px',marginBottom:'4px'}}>Assessment Consultant KW</h1>
            <p style={{...serif,fontSize:'16px',color:G.dim,fontStyle:'italic'}}>La Brasserie des Tuileries</p>
          </div>
          <div style={{...pnl,padding:'24px 22px'}}>
            <div style={{...mono,fontSize:'11px',color:G.gold,letterSpacing:'2px',marginBottom:'16px'}}>IDENTIFICATION</div>
            <div style={{display:'flex',gap:'10px',marginBottom:'14px'}}>
              <div style={{flex:1}}>
                <div style={{...mono,fontSize:'10px',color:G.dim,letterSpacing:'1.5px',marginBottom:'5px'}}>PRÉNOM</div>
                <input value={prenom} onChange={function(e){setPrenom(e.target.value);}}
                  style={{width:'100%',background:G.bg,border:'1px solid '+G.border,padding:'10px 12px',color:G.text,outline:'none',borderRadius:'2px',fontSize:'16px'}}/>
              </div>
              <div style={{flex:1}}>
                <div style={{...mono,fontSize:'10px',color:G.dim,letterSpacing:'1.5px',marginBottom:'5px'}}>NOM</div>
                <input value={nom} onChange={function(e){setNom(e.target.value);}}
                  style={{width:'100%',background:G.bg,border:'1px solid '+G.border,padding:'10px 12px',color:G.text,outline:'none',borderRadius:'2px',fontSize:'16px'}}/>
              </div>
            </div>
            <Btn onClick={function(){setRole('candidat');}} disabled={!prenom.trim()||!nom.trim()} full={true} variant="burg">ACCÉDER À L'ASSESSMENT →</Btn>
          </div>
        </div>
      </div>
    );
  }

  if(role==='candidat'){
    return <CandidatApp name={(prenom.trim()+' '+nom.trim()).trim()}/>;
  }
  if(role==='admin'){
    return <AdminApp/>;
  }

  // Login commun
  return (
    <div style={{background:G.bg,minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px'}}>
      <div style={{width:'100%',maxWidth:'440px'}}>
        <div style={{textAlign:'center',marginBottom:'28px'}}>
          <Logo size={52}/>
          <h1 style={{fontSize:'20px',fontWeight:600,color:G.text,marginTop:'14px',marginBottom:'4px'}}>Assessment Consultant KW</h1>
          <p style={{...serif,fontSize:'16px',color:G.dim,fontStyle:'italic'}}>La Brasserie des Tuileries</p>
        </div>
        <div style={{...pnl,padding:'24px 22px',marginBottom:'12px'}}>
          <div style={{...mono,fontSize:'11px',color:G.gold,letterSpacing:'2px',marginBottom:'14px'}}>CANDIDAT</div>
          <input type="password" value={pwd} onChange={function(e){setPwd(e.target.value);setPwdErr('');}}
            onKeyDown={function(e){if(e.key==='Enter')checkCandidatPwd();}}
            placeholder="Mot de passe candidat..."
            style={{width:'100%',background:G.bg,border:'1px solid '+(pwdErr?'#c04040':G.border),padding:'11px 13px',color:G.text,outline:'none',borderRadius:'2px',fontSize:'16px',marginBottom:'8px'}}/>
          {pwdErr&&<div style={{...mono,fontSize:'10px',color:'#c04040',marginBottom:'8px'}}>{pwdErr}</div>}
          <Btn onClick={checkCandidatPwd} disabled={!pwd.trim()} full={true}>ACCÉDER →</Btn>
        </div>
        <div style={{...pnl,padding:'24px 22px',background:'#f0f0f8',borderColor:'#c0c0d8'}}>
          <div style={{...mono,fontSize:'11px',color:'#6060c8',letterSpacing:'2px',marginBottom:'14px'}}>ADMINISTRATEUR</div>
          <input type="password" value={adminPwd} onChange={function(e){setAdminPwd(e.target.value);setAdminPwdErr('');}}
            onKeyDown={function(e){if(e.key==='Enter')checkAdminPwd();}}
            placeholder="Mot de passe administrateur..."
            style={{width:'100%',background:G.bg,border:'1px solid '+(adminPwdErr?'#c04040':'#c0c0d8'),padding:'11px 13px',color:G.text,outline:'none',borderRadius:'2px',fontSize:'16px',marginBottom:'8px'}}/>
          {adminPwdErr&&<div style={{...mono,fontSize:'10px',color:'#c04040',marginBottom:'8px'}}>{adminPwdErr}</div>}
          <button onClick={checkAdminPwd} disabled={!adminPwd.trim()}
            style={{width:'100%',background:adminPwd.trim()?'#6060c8':'#c0c0d8',color:'#fff',border:'none',padding:'11px 20px',fontFamily:"IBM Plex Mono,monospace",fontSize:'13px',fontWeight:600,letterSpacing:'1.5px',cursor:adminPwd.trim()?'pointer':'default',borderRadius:'2px'}}>
            ESPACE ADMIN →
          </button>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════════
// MODE CANDIDAT — BOOT PAR JETON (remplace le login mot de passe / choix de role)
// ════════════════════════════════════════════════════════════════════════════
function ParcoursBoot(){
  var [state,setState]=useState('loading'); // loading | ok | error
  var [nom,setNom]=useState('candidat');
  var [msg,setMsg]=useState('');
  useEffect(function(){
    var token=(new URLSearchParams(location.search).get('c')||'').trim();
    if(!token){ setMsg("Lien incomplet : ce lien ne contient pas de code d'acces."); setState('error'); return; }
    window.PARC_TOKEN=token;
    fetch('/.netlify/functions/parcours-token?c='+encodeURIComponent(token))
      .then(function(r){return r.json();})
      .then(function(d){
        if(!d||!d.valid){
          var R={'lien invalide':"Ce lien n'est pas valide.",'introuvable':"Ce lien ne correspond a aucun parcours.",'expiré':"Ce lien a expire.",'archivé':"Ce parcours a ete cloture.",'config':"Service momentanement indisponible.",'erreur':"Une erreur est survenue."};
          setMsg((d&&R[d.reason])||"Ce lien n'est pas accessible."); setState('error'); return;
        }
        setNom((d.candidat&&d.candidat.nom)||'candidat'); setState('ok');
      })
      .catch(function(){ setMsg("Connexion impossible. Reessayez dans un instant."); setState('error'); });
  },[]);
  if(state==='loading') return (
    <div style={{background:G.bg,minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{...mono,fontSize:'12px',color:G.gold,letterSpacing:'3px'}}>VERIFICATION DU LIEN...</div>
    </div>
  );
  if(state==='error') return (
    <div style={{background:G.bg,minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px'}}>
      <div style={{textAlign:'center',maxWidth:'380px'}}>
        <Logo size={48}/>
        <h2 style={{fontSize:'20px',fontWeight:600,color:G.burg,margin:'16px 0 8px'}}>Acces impossible</h2>
        <p style={{...serif,fontSize:'16px',color:G.dim,lineHeight:1.7}}>{msg}</p>
      </div>
    </div>
  );
  return <CandidatApp name={nom}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<ParcoursBoot/>);
</script>

  <input name="candidat"/>
  <input name="date"/>
  <input name="icm_global"/>

  <textarea name="transcript"></textarea>
  <textarea name="debrief_echange"></textarea>
  <textarea name="analyses_visuelles"></textarea>
  <textarea name="synthese_visuelle"></textarea>
</form>
