async function callClaude(payload, key) {
  // ── Stratégie : proxy Netlify en priorité, fallback direct uniquement si réseau mort ──

  if (window.PARC_TOKEN) payload = Object.assign({token: window.PARC_TOKEN}, payload);

    const r = await fetch('/.netlify/functions/parcours-claude', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });

    // La fonction a répondu — on utilise sa réponse dans tous les cas
    if (r.status === 404) {
      // Fonction non déployée → fallback
      proxyFailed = true;
    } else {
      // Réponse présente (200, 401, 500, etc.) — on lit le body
      const text = await r.text();
      let data;
      try { data = JSON.parse(text); }
      catch(_) {
        // Réponse non-JSON (page HTML d'erreur Netlify) → fallback
        proxyFailed = true;
        data = null;
      }
      if (!proxyFailed) {
        if (r.ok) return data;
        // Erreur API (clé invalide, quota, etc.) → message clair, pas de fallback
        throw new Error(
          (data && data.error) ||
          (data && data.error_message) ||
          'Erreur proxy Netlify (' + r.status + ') — vérifiez ANTHROPIC_API_KEY dans Netlify → Site configuration → Environment variables'
        );
      }

      'Si le problème persiste, contactez eric.nelson@kaizenway.fr'
    );
  }

    'Content-Type': 'application/json',
    'anthropic-version': '2023-06-01',

    {method:'POST', headers, body:JSON.stringify(payload)});
  if (!r.ok) {
    const t = await r.text();
    throw new Error('API ' + r.status + ': ' + t.slice(0,200));
  }
  return r.json();
}

// ─── RAPPORT ─────────────────────────────────────────────────
// Critères à poids double : Ancrage factuel chiffré (idx 1) + Co-construction plan perf (idx 5)
const ICC_WEIGHTS = [1, 2, 1, 1, 1, 2, 1, 1]; // ×2 sur critères 2 et 6
const ICC_CAP_CRITERIA = [1, 5]; // indices des critères à cap

function calcICC(ev, debSeconds) {
  if (!ev || !ev.criteres || !ev.criteres.length) return null;
  let total = 0, max = 0;
  ev.criteres.forEach((c, i) => {
    const w = ICC_WEIGHTS[i] || 1;
    total += (c.score || 0) * w;
    max   += 5 * w;
  });
  let icc = Math.round((total / max) * 100);

  // Cap programmatique : si les 2 critères pondérés sont ≤ 1, ICC plafonné à 50%
  // Rationale : sans chiffres ET sans action engagée, la qualité relationnelle
  // ne peut pas compenser l'absence d'impact sur la performance
  const c1 = ev.criteres[1]?.score || 0;  // Ancrage factuel chiffré
  const c5 = ev.criteres[5]?.score || 0;  // Co-construction plan perf
  if (c1 <= 1 && c5 <= 1) icc = Math.min(icc, 50);
  if (c1 === 0 || c5 === 0) icc = Math.min(icc, 35); // faute grave sur l'un = cap 35%

  // Malus durée débrief
  if (debSeconds !== undefined && debSeconds !== null) {
    const mins = debSeconds / 60;
    if (mins > 30 || (mins < 5 && mins > 0)) icc = Math.max(0, icc - 10);
  }
  return icc;
}

function getDebMalus(debSeconds) {
  if (!debSeconds) return null;
  const mins = debSeconds / 60;
  if (mins > 30) return { active: true, reason: 'Débrief > 30 min ('+Math.round(mins)+' min)' };
  if (mins < 5 && mins > 0) return { active: true, reason: 'Débrief < 5 min ('+Math.round(mins)+' min)' };
  return { active: false };
}

function buildReport(ev, name, sc, timings) {
  const stars = n => '★'.repeat(n)+'☆'.repeat(5-n);
  const d = new Date().toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const lines = [
    'KAIZEN WAY — RAPPORT DE DÉBRIEF','='.repeat(48),'',
    'Consultant : '+name,
    'Scénario   : '+sc.nom,
    'Profil     : '+sc.tag,
    'Industrie  : '+sc.industrie,
    'Date       : '+d,
    'Durée tournée : '+(timings?.tour||'—'),
    'Durée débrief : '+(timings?.debrief||'—'),'',
    'ICC           : '+calcICC(ev, timings?.debSeconds)+'%  (Indicateur de Comportement de Coach)',
    timings?.malus?.active ? 'Malus durée   : –10 pts · '+timings.malus.reason : null,
    ev.appreciation,'',
    'POINTS FORTS',
    ...ev.pointsForts.map(p=>'  + '+p),'',
    'AXES DE DÉVELOPPEMENT',
    ...ev.axes.map(a=>'  △ '+a),'',
    'CRITÈRES DÉTAILLÉS',
    ...ev.criteres.map(c=>'  '+c.nom.padEnd(32)+stars(c.score)+' '+c.score+'/5\n     '+c.commentaire),'',
    'CONSEIL',
    '  "'+ev.conseil+'"','',
    '─'.repeat(48),
    'Kaizen Way · Simulation Coaching IA'
  ];
  return lines.join('\n');
}

function sendMail(ev, name, sc) {
  const body = buildReport(ev, name, sc);
  const subj = encodeURIComponent('[KW Simulation] '+name+' — '+sc.nom+' — '+ev.scoreGlobal+'/5');
  window.open('mailto:a.humbert@kaizenway.fr?subject='+subj+'&body='+encodeURIComponent(body));
}

const EVAL_PROMPT = (notes, transcript, nomChef) =>
  'REGLE ABSOLUE : Reponds UNIQUEMENT en JSON compact, PAS de texte avant ou apres le JSON, PAS de markdown. Commentaires maximum 15 mots chacun.\n\n'
  +'Tu es un expert senior Kaizen Way avec 15 ans d experience terrain dans le coaching de managers de proximite industriels. Tu evalues les debriefs avec une exigence professionnelle elevee.\n\n'
  +'POSTURE D EVALUATEUR : Tu evalues avec exigence, bienveillance et construction. Un score moyen reflete un consultant en progression. Un score eleve recompense la maitrise reelle.\n\n'
  +'REGLE ABSOLUE : Tu evalues UNIQUEMENT les comportements du CONSULTANT. '
  +nomChef+' est le contexte, jamais l objet des feedbacks.\n\n'
  +'GRILLE DE SCORING — APPLIQUER STRICTEMENT :\n'
  +'5 = Comportement expert : fluide, naturel, impact visible. Rare.\n'
  +'4 = Bon comportement : present et efficace, maladresses mineures.\n'
  +'3 = Comportement partiel : approximatif ou inaboutit. Score median, pas valorisant.\n'
  +'2 = Comportement faible : rare ou contreproductif sur la moitie des occasions.\n'
  +'1 = Comportement absent ou clairement contreproductif.\n'
  +'0 = Comportement inadapte ou contre-productif sur ce critere, necessite un travail de fond.\n\n'
  +'ANCRES COMPORTEMENTALES :\n'
  +'- Posture non professionnelle (familiarite excessive, hors sujet) = 0 sur Posture d entree\n'
  +'- Aucune question ouverte = 1 sur Questions ouvertes\n'
  +'- Faire tout le diagnostic a la place du manager = 1 sur Posture coach vs expert\n'
  +'- Aucun fait observe cite = 1 sur Ancrage factuel\n'
  +'- Manager repart sans engagement ni prise de conscience = 1 sur Impact sur le manager\n\n'
  +'+== CRITERES A PONDERATION DOUBLE (x2 dans le score final) ==+\n'
  +'|                                                            |\n'
  +'|  ANCRAGE FACTUEL ET CHIFFRE (POIDS x2)                    |\n'
  +'|  Le consultant doit citer des faits precis observes        |\n'
  +'|  pendant la tournee ET utiliser des donnees chiffrees.     |\n'
  +'|  Exemples attendus : "j ai observe que...", "le TRS etait  |\n'
  +'|  a 71% contre 82% objectif", "12 minutes d arret sur L1",  |\n'
  +'|  "3 fois ce mois-ci". Sans chiffres = score max 2.        |\n'
  +'|                                                            |\n'
  +'|  CO-CONSTRUCTION PLAN PERFORMANCE (POIDS x2)              |\n'
  +'|  Le consultant doit orienter vers des actions concretes    |\n'
  +'|  avec impact mesurable sur la performance : TRS, qualite,  |\n'
  +'|  securite, delais. L action doit etre engagee par le       |\n'
  +'|  manager (pas suggeree par le consultant), chiffree        |\n'
  +'|  si possible, avec un responsable et une echeance.         |\n'
  +'|  Sans action chiffree ou engagee = score max 2.           |\n'
  +'|                                                            |\n'
  +'+============================================================+\n\n'
  +'CALIBRAGE ATTENDU (avant ponderation) :\n'
  +'10-25% = debrief avec des lacunes importantes necessitant un accompagnement\n'
  +'25-45% = debrief en construction, premier niveau de maitrise\n'
  +'50-65% = debrief structure avec de la methode\n'
  +'>70% = debrief expert, maitrise confirmee\n\n'
  +'NOTES DU CONSULTANT PENDANT LA TOURNEE :\n'+(notes||'(aucune note prise)')+'\n\n'
  +'TRANSCRIPTION DU DEBRIEF :\n'+(transcript||'(debrief non conduit ou trop court)')+'\n\n'
  +'CRITERES D EVALUATION (8 criteres) :\n'
  +'1. Posture d entree : mise en confiance professionnelle, cadrage clair et bienveillant\n'
  +'2. [POIDS x2] Ancrage factuel et chiffre : cite des faits precis observes ET des donnees chiffrees (TRS, temps d arret, nombre de NC, nombre d occurrences). Sans chiffres = 2 max.\n'
  +'3. Questions ouvertes : fait reflechir le manager, ne donne pas les reponses\n'
  +'4. Valorisation : identifie et nomme les points forts avant les axes\n'
  +'5. Profondeur d analyse : questionne les causes, pas seulement les symptomes\n'
  +'6. [POIDS x2] Co-construction plan perf : fait generer par le manager des actions concretes avec impact mesurable sur la performance (TRS, qualite, securite), avec engagement, responsable et echeance si possible. Sans action engagee = 2 max.\n'
  +'7. Posture coach vs expert : fait emerger les prises de conscience, n impose pas\n'
  +'8. Impact sur le manager : la reaction de '+nomChef+' montre-t-elle une prise de conscience, un engagement, une ouverture reelle ?\n\n'
  +'MOTS ET FORMULATIONS STRICTEMENT INTERDITS dans tes commentaires :\n'
  +'credibilite professionnelle, faute professionnelle, manque de professionnalisme, comportement non professionnel, peu professionnel, remet en cause la credibilite, impact sur la credibilite.\n'
  +'Remplace par : limite l impact du debrief, reduit la portee du coaching, affaiblit l ancrage des actions, nuit a la profondeur de l echange, prive le manager d un appui factuel.\n\n'
  +'CONSIGNE FINALE : Sois precis et factuel. Les commentaires doivent etre constructifs, exigeants et bienveillants, orientés progression concrete. Ne compense pas un critere faible par un autre fort. Criteres poids double (2 et 6) sont prioritaires.\n\n'
  +'Reponds UNIQUEMENT en JSON valide sans markdown :\n'
  +'{"appreciation":"2 phrases de diagnostic factuel sur la qualite du debrief.","pointsForts":["Ce que LE CONSULTANT a bien fait 1","Ce que LE CONSULTANT a bien fait 2","Ce que LE CONSULTANT a bien fait 3"],'
  +'"axes":["Axe de developpement prioritaire pour le consultant 1","axe 2","axe 3"],'
  +'"criteres":['
  +'{"nom":"Posture d entree","score":2,"commentaire":"1 phrase factuelle."},'
  +'{"nom":"Ancrage factuel et chiffre","score":2,"commentaire":"1 phrase : cite-t-il des faits precis ET des chiffres ?"},'
  +'{"nom":"Questions ouvertes","score":2,"commentaire":"1 phrase factuelle."},'
  +'{"nom":"Valorisation","score":2,"commentaire":"1 phrase factuelle."},'
  +'{"nom":"Profondeur d analyse","score":2,"commentaire":"1 phrase factuelle."},'
  +'{"nom":"Co-construction plan perf","score":2,"commentaire":"1 phrase : quelle action avec quel impact performance a ete engagee ?"},'
  +'{"nom":"Posture coach vs expert","score":2,"commentaire":"1 phrase factuelle."},'
  +'{"nom":"Impact sur le manager","score":2,"commentaire":"1 phrase sur la reaction observee de '+nomChef+'."}],'
  +'"conseil":"Un seul conseil prioritaire et concret pour le prochain debrief."}';

function Logo({size=36}) {
  return (
    <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
      <img src={LOGO_SRC} alt="KW" style={{height:size,width:'auto'}} />
      <span style={{...mono,fontSize:'13px',letterSpacing:'3px',color:G.burg,fontWeight:600}}>KAIZEN WAY</span>
    </div>
  );
}

function Btn({children,onClick,variant='gold',disabled,full,style={}}) {
  const base = {...mono,fontSize:'13px',fontWeight:600,letterSpacing:'1.5px',
    padding:'10px 20px',cursor:disabled?'default':'pointer',borderRadius:'2px',transition:'all .15s'};
  const variants = {
    gold:{background:disabled?G.panel:G.gold,border:`1px solid ${disabled?G.border:G.gold}`,color:disabled?G.faint:'#000'},
    burg:{background:G.burg,border:`1px solid ${G.burg}`,color:'#fff'},
    ghost:{background:'none',border:`1px solid ${G.blight}`,color:G.dim},
  };
  return <button onClick={disabled?null:onClick} style={{...base,...variants[variant],width:full?'100%':undefined,...style}}>{children}</button>;

// ── COMPOSANT DICTÉE VOCALE ──────────────────────────────────────────────────
function VoiceBtn({ onText, style={} }) {
  const [active, setActive] = useState(false);
  const [avail]  = useState(() => 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window);
  const recRef   = useRef(null);

  const stopRec = () => { recRef.current && recRef.current.stop(); setActive(false); };

  // Auto-stop after 3 min max
  useEffect(() => {
    if (!active) return;
    const t = setTimeout(stopRec, 180000);
    return () => clearTimeout(t);
  }, [active]);

  const toggle = () => {
    if (!avail) { alert('Dictée vocale non supportée sur ce navigateur (utilisez Chrome ou Edge).'); return; }
    if (active) { stopRec(); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SR();
    rec.lang = 'fr-FR';
    rec.continuous = true;
    rec.interimResults = false;
    rec.onresult = e => {
      const txt = Array.from(e.results).slice(e.resultIndex).map(r=>r[0].transcript).join(' ').trim();
      if (txt) onText(txt);
    };
    rec.onend = () => setActive(false);
    rec.onerror = () => setActive(false);
    rec.start();
    recRef.current = rec;
    setActive(true);
  };

  if (!avail) return null;

  return (
    <button onClick={toggle} title={active?'Arrêter la dictée':'Dicter (voix)'}
      style={{
        background: active ? '#6B1020' : 'none',
        border: `1px solid ${active ? '#6B1020' : '#c0a888'}`,
        color: active ? '#fff' : '#8a7868',
        padding:'4px 10px', borderRadius:'2px', cursor:'pointer',
        fontFamily:"'IBM Plex Mono',monospace", fontSize:'11px',
        letterSpacing:'1px', transition:'all .2s',
        display:'flex', alignItems:'center', gap:'5px',
        ...style
      }}>
      {active ? '⏹ Stop' : '🎤 Dicter'}
    </button>
  );
}

// ── JSON REPAIR ─────────────────────────────────────────────────────────────
// Tente de réparer un JSON tronqué en fermant les structures ouvertes
function repairJSON(str) {
  if (!str) return str;
  // Try direct parse first
  try { JSON.parse(str); return str; } catch(e) {}
  // Try extracting the longest valid JSON object
  var best = null;
  var depth = 0;
  var inStr = false;
  var esc = false;
  for (var i = 0; i < str.length; i++) {
    var c = str[i];
    if (esc) { esc = false; continue; }
    if (c === '\\') { esc = true; continue; }
    if (c === '"' && !esc) { inStr = !inStr; continue; }
    if (inStr) continue;
    if (c === '{') depth++;
    if (c === '}') {
      depth--;
      if (depth === 0) {
        var candidate = str.slice(0, i+1);
        try { JSON.parse(candidate); best = candidate; } catch(e) {}
      }
    }
  }
  if (best) return best;
  // Last resort: close all open braces/brackets
  var opens = []; inStr = false; esc = false;
  for (var j = 0; j < str.length; j++) {
    var ch = str[j];
    if (esc) { esc = false; continue; }
    if (ch === '\\') { esc = true; continue; }
    if (ch === '"') { inStr = !inStr; continue; }
    if (inStr) continue;
    if (ch === '{' || ch === '[') opens.push(ch === '{' ? '}' : ']');
    if ((ch === '}' || ch === ']') && opens.length) opens.pop();
  }
  if (inStr) str += '"';
  str += opens.reverse().join('');
  try { JSON.parse(str); return str; } catch(e) { return null; }
}

                setSc(found);
                const restoredMsgs = draft.transcript.split('\n\n').filter(l=>l.trim()).map(line => {
                  const isUser = line.startsWith('CONSULTANT KW:');
                  return { role: isUser?'user':'assistant', content: line.replace(/^[^:]+:\s*/,'') };
                });
                setMsgs(restoredMsgs);
                setNotes(draft.notes||'');
                try { localStorage.setItem('kw_key', apiKey); } catch(e){}
                setPhase('evaluation');
                setTimeout(() => doResubmit(found, draft), 300);

  // SÉLECTEUR
  if (phase==='selector') return (
    <div style={{background:G.bg,minHeight:'100vh',overflowY:'auto'}}>

                {String(s.id).padStart(2,'0')}
              </span>
              <div>
                <div style={{fontSize:'16px',fontWeight:600,color:G.text}}>{s.nom}</div>

              </div>
              <div style={{...mono,fontSize:'10px',color:G.faint,letterSpacing:'1px',textAlign:'right'}}>{s.industrie}</div>
            </button>
          ))
        ]}
      </div>
    </div>
    </div>
  );

  // BRIEFING
  if (phase==='briefing') return (
    <div style={{background:G.bg,minHeight:'100vh',overflowY:'auto'}}>
    <div style={{maxWidth:'640px',margin:'0 auto',padding:'32px 22px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'22px'}}>
        <Logo size={28}/>
        <button onClick={()=>setPhase('selector')} style={{...mono,fontSize:'11px',color:G.faint,background:'none',border:'none',cursor:'pointer',letterSpacing:'1.5px'}}>← CHANGER DE SCÉNARIO</button>

      <div style={{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'24px'}}>

  // SIMULATION
  if (phase==='simulation') return (

        <span style={{...mono,fontSize:'11px',color:G.dim}}>{sc.nom.toUpperCase()} · {scIdx+1}/{sc.scenes.length}</span>
          <span style={{...mono,fontSize:'13px',color:G.gold,marginLeft:'8px'}}>⏱ {fmtTime(tourTime)}</span>

  // DÉBRIEF

        <div style={{display:'flex',flexDirection:'column',overflow:'hidden'}}>
          {msgs.length===0&&(

                <p style={{...serif,fontSize:'15px',color:G.dim,lineHeight:1.7,margin:0,fontStyle:'italic'}}>

                <div style={{...mono,fontSize:'9px',color:G.faint,marginBottom:'2px',letterSpacing:'1.5px'}}>

                      if(window.speechSynthesis.speaking){window.speechSynthesis.cancel();return;}

                    style={{marginTop:'5px',background:'none',border:`1px solid ${G.border}`,

            <VoiceBtn onText={t=>setInput(i=>i+(i?' ':'')+t)} style={{marginRight:'4px'}}/>
            <textarea value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();chat();}}}
              placeholder="Votre intervention… (Entrée pour envoyer)" rows={2}
              style={{flex:1,background:G.panel,border:`1px solid ${G.blight}`,padding:'8px 11px',

            <button onClick={chat} disabled={!input.trim()||loading}

  // ÉVALUATION

        {loading&&!eval_&&!err&&(

            <p style={{...mono,color:'#aa5050',fontSize:'11px',marginBottom:'16px'}}>{err}</p>
            <div style={{display:'flex',gap:'8px',justifyContent:'center'}}>
              <Btn onClick={evaluer}>↺ RÉESSAYER</Btn>
              <Btn onClick={()=>setPhase('debrief')} variant='ghost'>← RETOUR</Btn>
            </div>
          </div>
        )}

        {eval_&&(
          <div>
            <div style={{fontSize:'48px',marginBottom:'16px'}}>✓</div>
            <h2 style={{fontSize:'22px',fontWeight:600,color:G.burg,marginBottom:'8px'}}>Débrief soumis à l'analyse</h2>
            <p style={{...serif,fontSize:'18px',color:G.dim,lineHeight:1.7,marginBottom:'28px'}}>
              Votre débrief a été transmis à l'équipe Kaizen Way.<br/>
              Un retour vous sera communiqué prochainement.
            </p>
            <div style={{...pnl,padding:'14px 18px',marginBottom:'12px',borderColor:G.gold+'60',background:'#fffbf0'}}>
              <div style={{...mono,fontSize:'11px',color:G.dim,letterSpacing:'2px',marginBottom:'4px'}}>SCÉNARIO COMPLÉTÉ</div>
              <div style={{fontSize:'17px',fontWeight:600,color:G.text}}>{sc.nom}</div>
              <div style={{...serif,fontSize:'15px',color:G.dim,fontStyle:'italic'}}>{sc.tag}</div>
            </div>

            <div style={{display:'flex',gap:'8px',justifyContent:'center'}}>
              <Btn onClick={()=>go(sc)} variant='ghost' style={{flex:1}}>↺ REJOUER</Btn>
              <Btn onClick={()=>setPhase('selector')} variant='burg' style={{flex:1}}>← AUTRES SCÉNARIOS</Btn>
            </div>
          </div>
        )}
      </div>
    </div>
  );
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
<form name="kw-rapport" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input name="form-name" value="kw-rapport"/>
  <input name="bot-field"/>
  <input name="consultant"/>
  <input name="scenario"/>
  <input name="industrie"/>
  <input name="date"/>
  <input name="score"/>
  <textarea name="rapport"></textarea>
  <textarea name="evaluation_json"></textarea>
  <textarea name="transcript"></textarea>
  <input name="timings"/>
</form>
</body>
</html>
