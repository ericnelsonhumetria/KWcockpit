let searchDegraded = false;
async function callClaude(system, userContent, useSearch = true) {
  async function attempt(withSearch) {
    const body = { model: "claude-sonnet-4-6", max_tokens: 1000, system, messages: [{ role: "user", content: userContent }] };
    if (withSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
    const headers = { "Content-Type": "application/json" };
    try {
      const s = CEREBRO_SB && (await CEREBRO_SB.auth.getSession());
      const tok = s && s.data && s.data.session && s.data.session.access_token;
      if (tok) headers["Authorization"] = "Bearer " + tok;
    } catch (e) {}
    const response = await fetch("/.netlify/functions/cerebro-claude", {
      method: "POST", headers: headers, body: JSON.stringify(body),
    });
    if (!response.ok) {
      let detail = ""; try { detail = (await response.text()).slice(0, 220); } catch (e) {}
      throw new Error(`API ${response.status} ${detail}`);
    }
    const data = await response.json();
    if (data.error) throw new Error(data.error.message || "erreur API");
    const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n").trim();
    if (!text) throw new Error("réponse vide du modèle");
    return text;
  }
  async function withRetry(withSearch, tries) {
    let lastErr;
    for (let i = 0; i < tries; i++) {
      try { return await attempt(withSearch); }
      catch (e) { lastErr = e; await new Promise(r => setTimeout(r, 400 * (i + 1))); }
    }
    throw lastErr;
  }
  searchDegraded = false;
  if (!useSearch) return withRetry(false, 3);            // 3 essais (gère un 500 passager)
  try { return await withRetry(true, 2); }               // 2 essais avec recherche
  catch (e) { searchDegraded = true; return withRetry(false, 2); } // repli sans recherche
}

  let t = text.replace(/```json/gi, "").replace(/```/g, "").trim();
  const s = t.indexOf("{");
  if (s < 0) throw new Error("JSON introuvable dans la réponse");
  t = t.slice(s);
  const e = t.lastIndexOf("}");
  if (e > 0) { try { return JSON.parse(t.slice(0, e + 1)); } catch (_) {} }
  return JSON.parse(closeTruncatedJSON(t)); // JSON tronqué : on répare
}
function closeTruncatedJSON(t) {
  // dernier séparateur/fermeture hors chaîne = point de coupe sûr
  let inStr = false, esc = false, cut = -1;
  for (let i = 0; i < t.length; i++) {
    const c = t[i];
    if (inStr) { if (esc) esc = false; else if (c === "\\") esc = true; else if (c === '"') inStr = false; continue; }
    if (c === '"') inStr = true;
    else if (c === "," || c === "}" || c === "]") cut = i;
  }
  if (cut < 0) throw new Error("JSON irrécupérable");
  let out = t.slice(0, t[cut] === "," ? cut : cut + 1); // si virgule, on la retire
  const st = []; inStr = false; esc = false;
  for (let i = 0; i < out.length; i++) {
    const c = out[i];
    if (inStr) { if (esc) esc = false; else if (c === "\\") esc = true; else if (c === '"') inStr = false; continue; }
    if (c === '"') inStr = true;
    else if (c === "{") st.push("}");
    else if (c === "[") st.push("]");
    else if (c === "}" || c === "]") st.pop();
  }
  while (st.length) out += st.pop(); // ferme les structures ouvertes
  return out;
}
function parseObjects(text) {
  let t = text.replace(/```json/gi, "").replace(/```/g, "").trim();
  const s = t.indexOf("["), e = t.lastIndexOf("]");
  if (s >= 0 && e > s) { try { const a = JSON.parse(t.slice(s, e + 1)); if (Array.isArray(a)) return a; } catch (_) {} }
  const objs = []; let depth = 0, start = -1;
  for (let i = 0; i < t.length; i++) {
    const ch = t[i];
    if (ch === "{") { if (depth === 0) start = i; depth++; }
    else if (ch === "}") { depth--; if (depth === 0 && start >= 0) { try { objs.push(JSON.parse(t.slice(start, i + 1))); } catch (_) {} start = -1; } }
  }
  if (objs.length === 0) throw new Error("aucune fiche exploitable dans la réponse");
  return objs;
}

  function parseCSV(text) {
    const rows = []; let field = "", row = [], inQ = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQ) {
        if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQ = false; }
        else field += c;
      } else if (c === '"') inQ = true;
      else if (c === ",") { row.push(field); field = ""; }
      else if (c === "\n" || c === "\r") { if (c === "\r" && text[i + 1] === "\n") i++; row.push(field); rows.push(row); row = []; field = ""; }
      else field += c;
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows.filter(r => r.some(x => x && x.trim()));
  }

  function importContacts(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const rows = parseCSV(String(reader.result));
        if (!rows.length) throw new Error("CSV vide");
        let hIdx = rows.findIndex(r => r.some(c => /first name|prénom|position|job title|intitulé|poste|titre/i.test(c)));
        if (hIdx < 0) hIdx = 0;
        const header = rows[hIdx].map(h => h.trim().toLowerCase());
        const col = (...names) => header.findIndex(h => names.some(n => h === n || h.includes(n)));
        const iFirst = col("first name", "prénom"), iLast = col("last name", "nom de famille"), iName = col("full name", "name", "nom complet"), iPos = col("position", "job title", "intitulé", "poste", "titre"), iComp = col("company", "entreprise", "organisation", "société");
        const out = [];
        for (let r = hIdx + 1; r < rows.length; r++) {
          const row = rows[r];
          const name = (iName >= 0 ? (row[iName] || "") : [row[iFirst], row[iLast]].filter(Boolean).join(" ")).trim();
          if (!name) continue;
          out.push({ name, position: (iPos >= 0 ? (row[iPos] || "") : "").trim(), company: (iComp >= 0 ? (row[iComp] || "") : "").trim() });
        }
        if (!out.length) throw new Error("aucun contact lisible (colonnes nom/poste introuvables)");
        const map = new Map(contacts.map(c => [(c.name + "|" + c.company).toLowerCase(), c]));
        for (const c of out) map.set((c.name + "|" + c.company).toLowerCase(), c);
        const merged = [...map.values()];
        persistContacts(merged); setNetErr("");
        setImportMsg(out.length + " lus · " + merged.length + " contacts au total (sauvegardés).");
      } catch (err) { setNetErr("Import impossible — " + (err?.message || "format non reconnu")); }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

                <div className="hr-cb-head">
                  <span className="hr-cb-rank">{String(i + 1).padStart(2, "0")}</span>
                  <span className="hr-cb-score" style={{ color: VERDICT[c.verdict].color }}>{c.score}</span>
                  <div className="hr-cb-mid">
                    <div className="hr-cb-name">{c.company}</div>
                    <div className="hr-cb-meta">{[c.sector, c.region].filter(Boolean).join(" · ")}</div>
                  </div>
                  <span className="hr-badge" style={{ color: VERDICT[c.verdict].color, background: VERDICT[c.verdict].color + "22" }}>{VERDICT[c.verdict].label}</span>
                  <button className="hr-del" onClick={() => dismissCandidate(c.company)} title="Écarter">×</button>
                </div>
                {c.why && <p className="hr-cb-why">{c.why}</p>}
                {c.entry_persona && <p className="hr-cb-persona">Point d'entrée : {c.entry_persona}</p>}
                {Array.isArray(c.watch) && c.watch.length > 0 && <p className="hr-cb-persona" style={{ color: "var(--amber)" }}>À vérifier : {c.watch.join(" · ")}</p>}
                <div className="hr-cb-actions">
                  <button className="hr-mini" onClick={() => qualifyCandidate(c.company)} disabled={!!qualifyingName}>
                    {qualifyingName === c.company ? <><span className="hr-spin" />…</> : "Qualifier en détail ▸"}
                  </button>
                </div>
              </div>
            ))}
            <p className="hr-caption">Scores Cerebro = estimation de cadrage. « Qualifier en détail » lance l'analyse approfondie (avec recherche web) et range le compte dans la shortlist.</p>
          </div>
        )}

        {/* Qualifier manuellement */}
        <div className="hr-card">
          <p className="hr-section-title">Qualifier un compte précis</p>
          <input className="hr-input" placeholder="Nom de l'entreprise (ex : Somfy)" value={company} onChange={e => setCompany(e.target.value)} onKeyDown={e => { if (e.key === "Enter" && !showNotes) qualify(); }} disabled={loading} />
          {showNotes && (
            <textarea className="hr-textarea" placeholder="Contexte connu (contact, événement, angle repéré…)" value={notes} onChange={e => setNotes(e.target.value)} disabled={loading} />
          )}
          <div style={{ display: "flex", alignItems: "center", gap: 16, marginTop: 4, flexWrap: "wrap" }}>
            <button className="hr-btn" onClick={qualify} disabled={loading || !company.trim()}>
              {loading ? <><span className="hr-spin" />Analyse en cours…</> : "Qualifier ▸"}
            </button>
            {!showNotes && <button className="hr-link" onClick={() => setShowNotes(true)}>+ ajouter du contexte</button>}
          </div>
          {error && <p className="hr-err">{error}</p>}
        </div>

        {/* Résultat */}
        {result && (
          <div className="hr-card">
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 10 }}>
              <div>
                <p className="hr-section-title" style={{ margin: "0 0 6px" }}>{result.company}</p>
                <span className="hr-gauge-verdict" style={{ color: VERDICT[result.verdict].color }}>{VERDICT[result.verdict].label}</span>
                <span className="hr-gauge-tag">{VERDICT[result.verdict].tag}</span>
              </div>
              <div className="hr-gauge-score" style={{ color: VERDICT[result.verdict].color }}>
                {result.score}<span style={{ fontSize: 18, color: "var(--mute)" }}>/100</span>
              </div>
            </div>
            <div className="hr-scale"><div className="hr-needle" style={{ left: needleLeft }} /></div>
            <div className="hr-ticks"><span>0</span><span>45</span><span>70</span><span>100</span></div>

            {result.signalScore != null && (
              <div className="hr-block">
                <p className="hr-label">Signal / timing{result.timing ? " — " + result.timing : ""}</p>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span className="hr-crit-bar"><span className="hr-crit-fill" style={{ width: result.signalScore + "%", background: result.signalScore >= 65 ? "#3FB68B" : result.signalScore >= 40 ? "#E0A63C" : "#C15B57" }} /></span>
                  <span className="hr-crit-w">{result.signalScore}</span>
                </div>
              </div>
            )}

            {result.firmographics && (
              <div className="hr-chips">
                {result.firmographics.sites && <span className="hr-chip"><b>sites</b> {result.firmographics.sites}</span>}
                {result.firmographics.managers && <span className="hr-chip"><b>managers</b> {result.firmographics.managers}</span>}
                {result.firmographics.sector && <span className="hr-chip">{result.firmographics.sector}</span>}
                {result.firmographics.revenue && <span className="hr-chip"><b>CA</b> {result.firmographics.revenue}</span>}
                {result.firmographics.geo && <span className="hr-chip">{result.firmographics.geo}</span>}
              </div>
            )}
            {Array.isArray(result.criteria) && result.criteria.length > 0 && (
              <div className="hr-block">
                <p className="hr-label">Détail par critère</p>
                {result.criteria.map((c, i) => {
                  const cs = clamp(c.score); const col = cs >= 70 ? "#3FB68B" : cs >= 45 ? "#E0A63C" : "#C15B57";
                  return (
                    <div key={i} className="hr-crit">
                      <span className="hr-crit-name" title={c.note}>{c.name}</span>
                      <span className="hr-crit-bar"><span className="hr-crit-fill" style={{ width: cs + "%", background: col }} /></span>
                      <span className="hr-crit-w">{cs}</span>
                    </div>
                  );
                })}
              </div>
            )}
            {result.icm_angle && <div className="hr-block"><p className="hr-label">Angle ICM®</p><p className="hr-value">{result.icm_angle}</p></div>}
            {result.entry_persona && <div className="hr-block"><p className="hr-label">Point d'entrée</p><p className="hr-value">{result.entry_persona}</p></div>}
            {Array.isArray(result.signals) && result.signals.length > 0 && (
              <div className="hr-block"><p className="hr-label">Signaux déclencheurs</p><ul className="hr-list">{result.signals.map((x, i) => <li key={i}>{x}</li>)}</ul></div>
            )}
            {Array.isArray(result.red_flags) && result.red_flags.length > 0 && (
              <div className="hr-block"><p className="hr-label">Drapeaux rouges</p><ul className="hr-list">{result.red_flags.map((x, i) => <li key={i} className="hr-flag">{x}</li>)}</ul></div>
            )}
            {result.next_step && <div className="hr-block"><p className="hr-label">Prochaine action</p><p className="hr-value">{result.next_step}</p></div>}

            {/* Carto décideurs */}
            <div className="hr-block" style={{ borderTop: "1px solid var(--line)", paddingTop: 14, marginTop: 18 }}>
              <p className="hr-label">Carto décideurs</p>
              {!result.decisionMap ? (
                <>
                  <button className="hr-btn ghost" onClick={mapDecisionMakers} disabled={mapping}>
                    {mapping ? <><span className="hr-spin cy" />Cartographie en cours…</> : "Cartographier les décideurs ▸"}
                  </button>
                  <p className="hr-caption" style={{ margin: "10px 4px 0" }}>Nommé seulement si source publique. Aucune coordonnée personnelle — un chemin d'approche.</p>
                </>
              ) : (
                <>
                  {result.decisionMap.roles.map((r, i) => {
                    const named = r.name && r.public;
                    return (
                      <div key={i} className={"hr-dm " + (named ? "named" : "tbc")}>
                        <div className="hr-dm-role">{r.role}</div>
                        <div className={"hr-dm-name " + (named ? "" : "tbc")}>{named ? r.name : "À confirmer"}{named && <span className="hr-pubtag">public</span>}</div>
                        {r.title && <div className="hr-dm-title">{r.title}</div>}
                        {r.source && <div className="hr-dm-src">Source : {r.source}</div>}
                        {r.approach && <div className="hr-dm-approach">Accès : {r.approach}</div>}
                      </div>
                    );
                  })}
                  {result.decisionMap.note && <p className="hr-caption" style={{ margin: "6px 4px 0" }}>{result.decisionMap.note}</p>}
                  <button className="hr-link" style={{ marginTop: 6 }} onClick={mapDecisionMakers} disabled={mapping}>{mapping ? "…" : "recartographier"}</button>
                </>
              )}
            </div>

            {/* Prise de conscience */}
            <div className="hr-block" style={{ borderTop: "1px solid var(--line)", paddingTop: 14, marginTop: 18 }}>
              <p className="hr-label">Prise de conscience — leviers de découverte</p>
              {!result.awareness ? (
                <>
                  <button className="hr-btn ghost" onClick={generateAwareness} disabled={awareLoading}>
                    {awareLoading ? <><span className="hr-spin cy" />Génération en cours…</> : "Générer les leviers ▸"}
                  </button>
                  {awareErr && <p className="hr-err">{awareErr}</p>}
                  <p className="hr-caption" style={{ margin: "10px 4px 0" }}>De quoi faire découvrir la douleur au prospect via ses propres chiffres — pas la lui asséner.</p>
                </>
              ) : (
                <>
                  <div className="hr-dm named"><div className="hr-dm-role">Recadrage</div><p className="hr-variant-body" style={{ marginTop: 3 }}>{result.awareness.reframe}</p></div>
                  <div className="hr-dm named"><div className="hr-dm-role">Question révélatrice</div><p className="hr-variant-body" style={{ marginTop: 3 }}>{result.awareness.question}</p></div>
                  <div className="hr-dm named"><div className="hr-dm-role">Coût de l'inaction</div><p className="hr-variant-body" style={{ marginTop: 3 }}>{result.awareness.cost}</p></div>
                  <div className="hr-dm named"><div className="hr-dm-role">Offre diagnostic</div><p className="hr-variant-body" style={{ marginTop: 3 }}>{result.awareness.diagnostic}</p></div>
                  {awareErr && <p className="hr-err">{awareErr}</p>}
                  <button className="hr-link" style={{ marginTop: 6 }} onClick={generateAwareness} disabled={awareLoading}>{awareLoading ? "…" : "régénérer"}</button>
                </>
              )}
            </div>

            {/* Approche (outreach) */}
            <div className="hr-block" style={{ borderTop: "1px solid var(--line)", paddingTop: 14, marginTop: 18 }}>
              <p className="hr-label">Approche — séquence de prise de contact</p>
              <div className="hr-seg">
                {CHANNELS.map(ch => (
                  <button key={ch.k} className={outChannel === ch.k ? "on" : ""} onClick={() => setOutChannel(ch.k)}>{ch.l}</button>
                ))}
              </div>
              <div className="hr-seg">
                <button className={outAngle === "insight" ? "on" : ""} onClick={() => setOutAngle("insight")}>Coût de l'inaction</button>
                <button className={outAngle === "preuve" ? "on" : ""} onClick={() => setOutAngle("preuve")}>Preuve &amp; marché</button>
              </div>
              <select className="hr-select" value={outTarget} onChange={e => setOutTarget(e.target.value)}>
                {targetOptions().map(o => <option key={o.key} value={o.key}>{o.label}</option>)}
              </select>
              <button className="hr-btn ghost" onClick={generateOutreach} disabled={outLoading}>
                {outLoading ? <><span className="hr-spin cy" />Rédaction en cours…</> : (result.outreach ? "Régénérer la séquence ▸" : "Rédiger la séquence ▸")}
              </button>
              {outErr && <p className="hr-err">{outErr}</p>}
              {result.outreach && Array.isArray(result.outreach.steps) && result.outreach.steps.length > 0 && (
                <>
                  <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 12 }}>
                    <button className="hr-copy" onClick={() => copyText("seq", result.outreach.steps.map(s => (s.step ? "— " + s.step + (s.when ? " (" + s.when + ")" : "") + " —\n" : "") + (s.subject ? "Objet : " + s.subject + "\n" : "") + (s.body || "")).join("\n\n"))}>{copied === "seq" ? "séquence copiée ✓" : "copier toute la séquence"}</button>
                  </div>
                  {result.outreach.steps.map((s, i) => {
                    const key = "s" + i;
                    const payload = (s.subject ? "Objet : " + s.subject + "\n\n" : "") + (s.body || "");
                    return (
                      <div key={i} className="hr-variant">
                        <p className="hr-variant-label">
                          <span>{s.step || ("Étape " + (i + 1))}{s.when && <span className="hr-when">{s.when}</span>}</span>
                          <button className="hr-copy" onClick={() => copyText(key, payload)}>{copied === key ? "copié ✓" : "copier"}</button>
                        </p>
                        {s.intent && <p className="hr-step-intent">{s.intent}</p>}
                        {s.subject && <p className="hr-variant-subj">Objet : {s.subject}</p>}
                        <p className="hr-variant-body">{s.body}</p>
                      </div>
                    );
                  })}
                </>
              )}
              <p className="hr-caption" style={{ marginTop: 12 }}>Brouillons à valider — aucun envoi automatique. Le message d'ouverture apporte une idée avant toute demande ; remplace toute [accroche] par un fait vérifié. Espace les relances (délais indicatifs) et arrête-toi dès qu'il répond. En B2B, le message doit concerner la fonction du destinataire et offrir un refus simple ; sur LinkedIn, reste sur la plateforme.</p>
            </div>
          </div>
        )}

        {/* Grille ICP */}
        <div className="hr-card">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <p className="hr-section-title" style={{ margin: 0 }}>Grille ICP</p>
            <button className="hr-link" onClick={() => setShowIcp(v => !v)}>{showIcp ? "masquer" : "éditer ▸"}</button>
          </div>
          {showIcp && (
            <div style={{ marginTop: 14 }}>
              {icp.map((c, i) => (
                <div key={i} className="hr-icp-row">
                  <input className="hr-icp-name" value={c.name} onChange={e => updateIcp(i, "name", e.target.value)} />
                  <input className="hr-icp-w" value={c.weight} inputMode="numeric" onChange={e => updateIcp(i, "weight", e.target.value)} />
                </div>
              ))}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 6 }}>
                <span className={"hr-icp-total" + (icpTotal !== 100 ? " warn" : "")}>Somme des poids : {icpTotal}{icpTotal !== 100 ? " (idéal : 100)" : " ✓"}</span>
                <button className="hr-link" onClick={() => persistIcp(DEFAULT_ICP)}>réinitialiser</button>
              </div>
            </div>
          )}
        </div>

        {/* Shortlist */}
        <div>
          <p className="hr-section-title" style={{ padding: "0 4px" }}>Shortlist {accounts.length > 0 && `· ${accounts.length}`}</p>
          {!ready ? null : accounts.length === 0 ? (
            <div className="hr-empty">Aucun compte qualifié.<br />Lance Cerebro ou entre une entreprise.</div>
          ) : (
            accounts.map(a => (
              <div key={a.ts} className="hr-item" onClick={() => { setResult(a); setOutTarget("default"); window.scrollTo({ top: 0, behavior: "smooth" }); }}>
                <span className="hr-item-score" style={{ color: VERDICT[a.verdict].color }}>{a.score}</span>
                <div className="hr-item-mid">
                  <div className="hr-item-name">{a.company}{a.decisionMap ? " ◎" : ""}{a.outreach ? " ✎" : ""}</div>
                  <div className="hr-item-sub">{a.firmographics?.sector || ""}{a.entry_persona ? ` · ${a.entry_persona}` : ""}</div>
                </div>
                <span className="hr-badge" style={{ color: VERDICT[a.verdict].color, background: VERDICT[a.verdict].color + "22" }}>{VERDICT[a.verdict].label}</span>
                <button className="hr-del" onClick={e => { e.stopPropagation(); removeAccount(a.ts); }} title="Retirer">×</button>
              </div>
            ))
          )}
        </div>

        </>)}

        {tab === "evenements" && (<>

        {/* ── Radar Événements ── */}
        <div className="hr-card cerebro" style={{ marginTop: 8 }}>
          <p className="hr-cerebro-title">◎ CEREBRO EVENTS</p>
          <p className="hr-cerebro-sub">Concours, salons, prix et événements classés par impact pour Humetria. Prêt à dire « Passer ».</p>
          <input className="hr-input" placeholder="Focus optionnel (ex : AURA, agro, industrie 4.0)" value={eventFocus} onChange={e => setEventFocus(e.target.value)} disabled={eventScanning} />
          <button className="hr-btn" onClick={runEvents} disabled={eventScanning}>
            {eventScanning ? <><span className="hr-spin" />Chasse en cours…</> : "Chasser les opportunités ▸"}
          </button>
          {eventErr && <p className="hr-err">{eventErr}</p>}
        </div>
        {events.length > 0 && (
          <div style={{ marginBottom: 16 }}>
            {events.map((ev, i) => {
              const v = eventVerdict(ev.score);
              return (
                <div key={ev.name + i} className="hr-cb">
                  <div className="hr-cb-head">
                    <span className="hr-cb-rank">{String(i + 1).padStart(2, "0")}</span>
                    <span className="hr-cb-score" style={{ color: v.color }}>{ev.score}</span>
                    <div className="hr-cb-mid">
                      <div className="hr-cb-name">{ev.name}</div>
                      <div className="hr-cb-meta">{[ev.type, ev.region, ev.format].filter(Boolean).join(" · ")}</div>
                    </div>
                    <span className="hr-badge" style={{ color: v.color, background: v.color + "22" }}>{v.label}</span>
                    <button className="hr-del" onClick={() => dismissEvent(ev.name)} title="Écarter">×</button>
                  </div>
                  {ev.desc && <p className="hr-cb-why">{ev.desc}</p>}
                  {ev.why && <p className="hr-cb-persona">Impact : {ev.why}</p>}
                  {ev.verified ? (
                    <div style={{ marginTop: 8 }}>
                      <div className="hr-ev-grid">
                        {ev.dates && <div><span className="hr-ev-k">Dates</span>{ev.dates}{ev.edition ? ` (${ev.edition})` : ""}</div>}
                        {ev.location && <div><span className="hr-ev-k">Lieu</span>{ev.location}</div>}
                        {ev.deadline && <div><span className="hr-ev-k">Deadline</span><span style={{ color: "var(--amber)" }}>{ev.deadline}</span></div>}
                        {ev.cost && <div><span className="hr-ev-k">Coût</span>{ev.cost}</div>}
                        {ev.audience && <div style={{ gridColumn: "1 / -1" }}><span className="hr-ev-k">Audience</span>{ev.audience}</div>}
                        {ev.format_leverage && <div style={{ gridColumn: "1 / -1" }}><span className="hr-ev-k">Format à jouer</span>{ev.format_leverage}</div>}
                      </div>
                      {ev.opportunity && <p className="hr-cb-persona" style={{ marginTop: 8 }}><b style={{ color: "var(--paper)" }}>Opportunité :</b> {ev.opportunity}</p>}
                      {ev.recommendation && <p className="hr-cb-persona"><b style={{ color: "var(--paper)" }}>Reco :</b> {ev.recommendation}</p>}
                      {ev.url
                        ? <p className="hr-cb-persona" style={{ wordBreak: "break-all", marginTop: 4 }}><a href={ev.url} target="_blank" rel="noreferrer" style={{ color: "var(--cyan)" }}>{ev.url} ↗</a></p>
                        : <p className="hr-cb-persona" style={{ marginTop: 4 }}>Lien non confirmé — à chercher sur le site officiel.</p>}
                      {ev.vnote && <p className="hr-cb-persona" style={{ fontStyle: "italic" }}>{ev.vnote}</p>}
                    </div>
                  ) : (
                    ev.check && <p className="hr-cb-persona" style={{ color: "var(--amber)" }}>À vérifier : {ev.check}</p>
                  )}
                  <div className="hr-cb-actions">
                    <button className="hr-mini" onClick={() => verifyEvent(ev.name)} disabled={!!verifyingEvent}>
                      {verifyingEvent === ev.name ? <><span className="hr-spin" />…</> : (ev.verified ? "Revérifier ▸" : "Vérifier dates & lien ▸")}
                    </button>
                  </div>
                </div>
              );
            })}
            <p className="hr-caption">Impact = estimation de cadrage. « Vérifier » constitue le dossier : dates, lieu, deadline, coût, audience, opportunité et lien officiel. Les faits datés viennent de la recherche web — jamais inventés ; reconfirme une deadline avant de bloquer ton planning.</p>
          </div>
        )}

        </>)}

        {/* Données — sauvegarde / restauration */}
        <div className="hr-card" style={{ marginTop: 16 }}>
          <p className="hr-section-title">Sauvegarde des données</p>
          <p className="hr-caption" style={{ margin: "0 0 12px 0" }}>Tes données sont enregistrées en continu dans cet outil et rechargées à l'ouverture — rien n'est perdu entre les sessions. L'export ci-dessous est une copie de secours (changement de version, reprise ailleurs). Le téléchargement de fichier est parfois bloqué dans l'app : dans ce cas, copie simplement le texte.</p>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
            <button className="hr-btn ghost" style={{ marginTop: 0 }} onClick={exportData} disabled={!(accounts.length || candidates.length || events.length || network.length || contacts.length)}>Exporter (sauvegarde) ▸</button>
            <label className="hr-btn ghost" style={{ marginTop: 0, display: "inline-block" }}>
              Importer un fichier
              <input type="file" accept="application/json,.json" onChange={handleImport} style={{ display: "none" }} />
            </label>
            <button className="hr-link" onClick={clearAll}>tout effacer</button>
          </div>
          {exportText && (
            <div style={{ marginTop: 14 }}>
              <p className="hr-nettag-k">Sauvegarde — copie ce texte dans un fichier .json</p>
              <textarea className="hr-textarea" readOnly value={exportText} onFocus={e => e.target.select()} style={{ minHeight: 120, fontFamily: "'IBM Plex Mono',monospace", fontSize: 11 }} />
              <button className="hr-mini" onClick={() => copyText("exp", exportText)}>{copied === "exp" ? "copié ✓" : "Copier la sauvegarde"}</button>
            </div>
          )}
          <div style={{ marginTop: 14 }}>
            <p className="hr-nettag-k">Restaurer depuis un texte collé</p>
            <textarea className="hr-textarea" value={importText} onChange={e => setImportText(e.target.value)} placeholder="Colle ici le contenu d'une sauvegarde JSON…" style={{ minHeight: 70, fontFamily: "'IBM Plex Mono',monospace", fontSize: 11 }} />
            <button className="hr-mini" onClick={importFromText} disabled={!importText.trim()}>Restaurer ▸</button>
          </div>
          {dataMsg && <p className="hr-caption" style={{ margin: "12px 4px 0", color: "var(--cyan)" }}>{dataMsg}</p>}
        </div>

      </div>
    </div>
  );
}


async function cerebroBoot(){
  var mount = document.getElementById('root');
  var session = null;
  try { var s = await CEREBRO_SB.auth.getSession(); session = s && s.data ? s.data.session : null; } catch(e){}
  if(!session){
    mount.innerHTML = '<div style="max-width:520px;margin:80px auto;padding:24px;'
      + 'font-family:Inter,system-ui,sans-serif;color:#F2ECE3;background:#1a1214;'
      + 'border:1px solid #3a2b2e;border-radius:12px;line-height:1.6;">'
      + '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:11px;letter-spacing:.08em;'
      + 'text-transform:uppercase;color:#9c8f88;margin-bottom:8px;">CEREBRO</div>'
      + 'Connecte-toi d\'abord au <b>Cockpit KW</b> (meme navigateur), puis reviens sur cette page.'
      + '</div>';
    return;
  }
  ReactDOM.createRoot(mount).render(<RadarComptes/>);
}
cerebroBoot();

</script>
</body>
</html>
